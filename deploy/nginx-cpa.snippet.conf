# Example: expose CLIProxyAPI via cpa-gateway on a public host.
# Put inside your HTTPS server { } block. Replace upstream address if needed.
#
# Flow: Client → Nginx /cpa/ → cpa-gateway :8318 → CLIProxyAPI :8317

# Docker nginx on same host often reaches host services via 172.17.0.1;
# bare-metal can use 127.0.0.1 if nginx runs on the host.

location /cpa/ {
    proxy_pass http://127.0.0.1:8318/;
    # proxy_pass http://172.17.0.1:8318/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
}

location = /cpa {
    return 301 /cpa/;
}
